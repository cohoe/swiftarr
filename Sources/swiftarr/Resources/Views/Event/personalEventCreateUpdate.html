#extend("trunk"):
    #export("body"):
        <div class="container-md ms-0 mt-2">
            <div class="row">
    			<div class="col col-auto">
    				<b>#(pageTitle)</b>
				</div>
			</div>
            <div class="row">
    			<div class="col">
					<ul class="container-md mx-0 px-0 list-group">
						<li class="list-group-item bg-transparent mb-3">				
							<form class="ajax" action="#(formAction)" enctype="multipart/form-data" method="POST" data-successurl="/events">
								<div class="row mb-3">
									<div class="input-group">
										<input type="text" class="form-control" placeholder="Title" name="title" aria-label="Title" value="#(eventTitle)">
									</div>
								</div>
								<div class="row mb-3">
									<div class="input-group">
										<input type="text" class="form-control" placeholder="Location" name="location" aria-label="Location" value="#(eventLocation)">										
									</div>
								</div>
								<div class="row mb-3 justify-content-end">
									<div class="col col-auto">
										<button type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="\#locationModal">Note on Locations</button>
									</div>
								</div>
								<div class="row mb-2">
									<div class="col">
										Start Time: <input type="datetime-local" name="starttime" id="datetime" #if(eventStartTime):value="#localTime(eventStartTime)"#endif>
									</div>
								</div>
								<div class="row mb-2">
									<label for="duration" class="col-form-label col-auto d-flex">Duration:</label>
									<select class="duration-select" aria-label="Duration" id="duration" name="duration">
										<option value="30"#if(eventDurationMinutes < 45): selected#endif>30 Mins</option>
										<option value="60"#if(eventDurationMinutes >= 45 && eventDurationMinutes < 75): selected#endif>1 Hr</option>
										<option value="90"#if(eventDurationMinutes >= 75 && eventDurationMinutes < 105): selected#endif>1:30</option>
										<option value="120"#if(eventDurationMinutes >= 105 && eventDurationMinutes < 150): selected#endif>2 Hrs</option>
										<option value="180"#if(eventDurationMinutes >= 150 && eventDurationMinutes < 210): selected#endif>3 Hrs</option>
										<option value="240"#if(eventDurationMinutes >= 210): selected#endif>4 Hrs</option>
									</select>
								</div>
								<div class="row">
									<div class="col">
										<textarea class="form-control" 
												maxlength="2000" 
												data-lengthlabel="eventDescriptionLabel" 
												rows="4" 
												placeholder="Description" 
												name="description">#(eventDescription)</textarea>
									</div>
								</div>
								<div class="row justify-content-end mb-2">
									<div class="col col-auto">
										<div class="input-group-text input-group-sm py-0" id="eventDescriptionLabel"></div>
									</div>
								</div>
								<div class="alert alert-danger mt-3 d-none" role="alert"></div>				
								<div class="row mb-2">
									<div class="col">
										<small>Please remember to abide by the <a href="/codeOfConduct">Code of Conduct</a></small>
									</div>
									<div class="col col-auto">
										<button type="submit" class="btn btn-primary">#(submitButtonTitle)<span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span></button>
									</div>
								</div>
							</form>
						</li>
					</ul>
    			</div>
			</div>
		</div>
        <div class="modal fade" id="locationModal" tabindex="-1" aria-labelledby="locationModalTitle" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="locationModalTitle">About Personal Event Locations</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<ol>
							<li>Personal Events are not a reservation system. You can't claim a room or even a table by scheduling a personal event there.</li>
						</ol>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-primary" data-bs-dismiss="modal">Alrrright</button>
					</div>
				</div>
			</div>
		</div>
    #endexport
#endextend
