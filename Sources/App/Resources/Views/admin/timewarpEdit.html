#extend("trunk"):
    #export("body"):
    	<div class="container-md ms-0 my-1">
			<div class="row">
    			<div class="col">
					<nav aria-label="breadcrumb">
						<ol class="breadcrumb">
							<li class="breadcrumb-item"><a href="/admin">Admin</a></li>
							<li class="breadcrumb-item"><a href="/admin/timewarps">Time Warps</a></li>
							<li class="breadcrumb-item active" aria-current="page">Create/Edit</li>
						</ol>
					</nav>
				</div>
				<div class="col col-auto">
					<b>#if(post.isEdit):Edit#else:Create#endif Time Warp</b>
				</div>
			</div>
			<ul class="container-md mx-0 px-0 list-group">
				<li class="list-group-item bg-transparent mb-3">				
					<form class="ajax" action="#(post.formAction)" enctype="multipart/form-data" method="POST" data-successurl="#(post.postSuccessURL)" id="messagePostForm">
						<div class="container-fluid">
							<div class="row"> 
								<textarea 
										class="form-control" 
										maxlength="2000" 
										data-lengthlabel="announcementLimitsLabel" 
										rows="5" 
										name="postText" 
										id="postText" 
										placeholder="Comment">#(post.messageText)</textarea>
							</div>
							<div class="row justify-content-end mb-3">
								<div class="col col-auto input-group-text input-group-sm py-0" id="announcementLimitsLabel"></div>
							</div>

							<div class="row mb-2">
								<div class="col">
									New Offset: <input type="number" name="newOffset" #if(post.new_offset != ""):value="#post.new_offset"#endif> minutes from GMT.
								</div>
							</div>
							<div class="row mb-2">
								<div class="col">
									Previous Offset: <input type="number" name="previousOffset" #if(post.previous_offset != ""):value="#post.previous_offset)"#endif> minutes from GMT.
								</div>
							</div>

							<div class="row mb-2">
								<div class="col">
									Occur At: <input type="datetime-local" name="occurAt" > @TODO TIMEZONE
								</div>
							</div>
							<div class="alert alert-danger mt-3 d-none" role="alert">
							</div>		
							<div class="row mb-2">
								<div class="col col-auto gx-0">
									<button type="submit" class="btn btn-primary">Save</button>
								</div>
							</div>
						</div>
					</form>
				</li>
			</ul>
    	</div>
	#endexport
#endextend
